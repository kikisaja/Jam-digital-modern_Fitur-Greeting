<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Digital Pop Art ⏰✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clock-container">
        <header class="clock-header">
            <h2 id="greeting-text">Selamat Datang! 👋</h2>
            <p id="date-text">Hari, 00 Bulan 2026</p>
        </header>

        <main class="clock-display">
            <div class="time-box">
                <span id="txt-jam">00</span>
                <small>JAM</small>
            </div>
            <div class="time-divider">:</div>
            <div class="time-box">
                <span id="txt-menit">00</span>
                <small>MENIT</small>
            </div>
            <div class="time-divider">:</div>
            <div class="time-box-seconds">
                <span id="txt-detik">00</span>
                <small>DETIK</small>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
